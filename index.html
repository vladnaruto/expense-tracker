<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Витрати</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
<header><h1>💰 Витрати</h1></header>

<main id="home" class="tab active">
<div class="stats">
<div class="card"><span>Сьогодні</span><b id="today">0€</b></div>
<div class="card"><span>Тиждень</span><b id="week">0€</b></div>
<div class="card"><span>Місяць</span><b id="month">0€</b></div>
</div>
<div id="list"></div>
</main>

<main id="categories" class="tab">
<div id="cats" class="cats"></div>
<div id="form" class="hidden">
<h3 id="catTitle"></h3>
<input id="amount" type="number" step="0.01" placeholder="Сума">
<input id="comment" placeholder="Коментар">
<button onclick="saveExpense()">Зберегти</button>
</div>
</main>

<main id="settings" class="tab">
<h2>Параметри</h2>
<button onclick="setTheme('light')">☀️ Світла тема</button>
<button onclick="setTheme('dark')">🌙 Темна тема</button>
</main>

<nav>
<button onclick="showTab('categories')">Категорії</button>
<button onclick="showTab('home')">Головна</button>
<button onclick="showTab('settings')">Параметри</button>
</nav>
</div>
<script src="app.js"></script>
</body>
</html>
